<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0"
    />
    <title>LLM TestRunner</title>

    <link rel="stylesheet" href="/demo/vanilla-demo.css" />
    <script type="module" src="/build/llm-testrunner.esm.js"></script>
    <script nomodule src="/build/llm-testrunner.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>LLM TestRunner</h1>

      <main class="demo-section">
        <h2>LLM Test Runner</h2>
        <p>
          Test LLM responses with automated evaluation. Enter questions, set
          expected keywords and source links, then run tests to see how well the
          AI responds.
        </p>

        <div class="demo-mode-bar" role="group" aria-label="Examples">
          <button type="button" id="mode-default" aria-pressed="true">
            Simple Test
          </button>
          <button type="button" id="mode-schema" aria-pressed="false">
            Multiple Expected Outcomes
          </button>
          <button type="button" id="mode-dynamic" aria-pressed="false">
            Dynamic Expected Outcome
          </button>
        </div>

        <div id="runner-host"></div>
      </main>
    </div>

    <script type="module" src="/demo/vanilla-demo.js"></script>
  </body>
</html>
