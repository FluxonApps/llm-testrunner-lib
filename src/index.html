<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0"
    />
    <title>Fluxon LLM TestRunner</title>

    <link rel="stylesheet" href="/demo/vanilla-demo.css" />
    <script type="module" src="/build/llm-testrunner.esm.js"></script>
    <script nomodule src="/build/llm-testrunner.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>Fluxon LLM TestRunner</h1>

      <main class="demo-section">
        <h2>Fluxon LLM TestRunner</h2>
        <p>
          Test LLM responses with automated evaluation. Enter questions, set
          expected keywords and source links, then run tests to see how well the
          AI responds.
        </p>

        <div class="demo-example-row">
          <label class="demo-example-row__label" for="demo-example-mode">Example</label>
          <select id="demo-example-mode" class="demo-example-row__select">
            <option value="simpleTest">Simple Test</option>
            <option value="multipleExpectedOutcomes">
              Multiple Expected Outcomes
            </option>
            <option value="dynamicExpectedOutcome">
              Dynamic Expected Outcome
            </option>
            <option value="llmJudge">LLM as Judge</option>
          </select>
        </div>

        <div id="runner-host"></div>
      </main>
    </div>

    <script type="module" src="/demo/vanilla-demo.js"></script>
  </body>
</html>
